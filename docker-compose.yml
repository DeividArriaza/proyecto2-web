# docker-compose unificado: mismo archivo para dev local y para producción.
#
# Topología single-domain. El navegador habla SOLO con el frontend (nginx :80),
# y nginx hace proxy_pass de /api/* al backend en la red interna. La DB y el
# backend NO se exponen al host — quedan inaccesibles desde fuera de Docker.
#
# El frontend usa rutas relativas (`/api/*`), así que el bundle no tiene
# URLs hardcodeadas y funciona bajo cualquier dominio (localhost,
# www.servigtdev.com, etc.) sin rebuildear.
#
# Levantar:
#   docker compose up --build
#
# En el servidor de producción podés mapear el host port a :80 cambiando
# FRONTEND_PORT=80 en .env.

services:
  db:
    build: ./db
    container_name: proy2web_db
    restart: unless-stopped
    command: ["postgres", "-p", "${POSTGRES_PORT}"]
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    # Sin "ports": solo accesible al backend dentro de la red de compose.
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -p ${POSTGRES_PORT} -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: proy2web_backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: ${BACKEND_PORT}
      DB_HOST: db
      DB_PORT: ${POSTGRES_PORT}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB}
      SESSION_SECRET: ${SESSION_SECRET}
    # Sin "ports": el backend solo se alcanza vía nginx desde el frontend.
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: proy2web_frontend
    restart: unless-stopped
    environment:
      # Resuelve a "backend:${BACKEND_PORT}" en la red interna del compose.
      BACKEND_HOST: backend:${BACKEND_PORT}
    ports:
      # Único puerto expuesto al mundo. En el server real, FRONTEND_PORT=80 en .env.
      - "${FRONTEND_PORT}:80"
    depends_on:
      - backend

volumes:
  pgdata:
